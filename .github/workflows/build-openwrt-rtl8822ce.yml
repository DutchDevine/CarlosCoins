name: Build OpenWrt x86 RTL8822CE

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-openwrt-rtl8822ce.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      OPENWRT_VERSION: '25.12.5'
      ASU_URL: 'https://sysupgrade.openwrt.org'

    steps:
      - name: Request customized image from official OpenWrt builder
        shell: bash
        run: |
          set -Eeuo pipefail

          cat > defaults.sh <<'EOF'
          #!/bin/sh
          uci set network.lan.ipaddr='10.77.77.1'
          uci set network.lan.netmask='255.255.255.0'
          uci set dhcp.lan.start='100'
          uci set dhcp.lan.limit='150'
          uci set dhcp.lan.leasetime='12h'
          uci commit network
          uci commit dhcp
          exit 0
          EOF

          jq -n \
            --arg version "$OPENWRT_VERSION" \
            --arg defaults "$(cat defaults.sh)" \
            '{
              version: $version,
              target: "x86/64",
              profile: "generic",
              packages: [
                "luci",
                "luci-ssl",
                "ca-bundle",
                "kmod-rtw88-8822ce",
                "rtl8822ce-firmware",
                "wireless-regdb",
                "wpad-basic-mbedtls",
                "iw",
                "iwinfo",
                "pciutils",
                "ethtool"
              ],
              defaults: $defaults,
              client: "github-actions-rdz/1.0",
              rootfs_size_mb: 512,
              filesystem: "ext4",
              diff_packages: true
            }' > request.json

          echo 'OpenWrt build request:'
          jq '{version,target,profile,packages,rootfs_size_mb,filesystem,diff_packages}' request.json

          HTTP_CODE="$(curl -4 --silent --show-error --location \
            --connect-timeout 30 --max-time 120 \
            --output response.json --write-out '%{http_code}' \
            --header 'Content-Type: application/json' \
            --request POST \
            --data @request.json \
            "$ASU_URL/api/v1/build")"

          echo "Initial HTTP status: $HTTP_CODE"
          cat response.json | jq . || cat response.json

          if [[ "$HTTP_CODE" != "200" && "$HTTP_CODE" != "202" ]]; then
            echo 'The OpenWrt build server rejected the request.' >&2
            exit 1
          fi

          REQUEST_HASH="$(jq -r '.request_hash // empty' response.json)"
          if [[ -z "$REQUEST_HASH" ]]; then
            echo 'No request_hash returned by the OpenWrt build server.' >&2
            exit 1
          fi

          echo "Request hash: $REQUEST_HASH"

          for attempt in $(seq 1 180); do
            HTTP_CODE="$(curl -4 --silent --show-error --location \
              --connect-timeout 30 --max-time 120 \
              --output response.json --write-out '%{http_code}' \
              "$ASU_URL/api/v1/build/$REQUEST_HASH")"

            STATUS="$(jq -r '.imagebuilder_status // .detail // "unknown"' response.json 2>/dev/null || echo unknown)"
            echo "Poll $attempt: HTTP $HTTP_CODE, status $STATUS"

            if [[ "$HTTP_CODE" == "200" && "$STATUS" == "done" ]]; then
              break
            fi

            if [[ "$HTTP_CODE" != "200" && "$HTTP_CODE" != "202" ]]; then
              cat response.json | jq . || cat response.json
              exit 1
            fi

            if [[ "$attempt" == "180" ]]; then
              echo 'Timed out waiting for the OpenWrt image build.' >&2
              cat response.json | jq . || cat response.json
              exit 1
            fi

            sleep 10
          done

          jq . response.json
          cp response.json build-response.json

      - name: Download generated USB boot images
        shell: bash
        run: |
          set -Eeuo pipefail

          mkdir -p artifact
          BIN_DIR="$(jq -r '.bin_dir // empty' build-response.json)"
          if [[ -z "$BIN_DIR" ]]; then
            echo 'The completed response does not contain bin_dir.' >&2
            exit 1
          fi

          mapfile -t IMAGES < <(
            jq -r '.images[]?.name // empty' build-response.json |
            grep -E 'generic-ext4-combined(-efi)?[^/]*\.img\.gz$' || true
          )

          if [[ "${#IMAGES[@]}" -eq 0 ]]; then
            echo 'No combined EXT4 x86 USB images were returned.' >&2
            jq '.images' build-response.json
            exit 1
          fi

          for IMAGE in "${IMAGES[@]}"; do
            echo "Downloading $IMAGE"
            curl -4 --fail --show-error --location --retry 5 --retry-delay 5 \
              --output "artifact/$IMAGE" \
              "$ASU_URL/store/$BIN_DIR/$IMAGE"
          done

          cp build-response.json artifact/
          cd artifact
          sha256sum *.img.gz > RDZ-SHA256SUMS.txt

          cat > README-FIRST.txt <<'EOF'
          RENZODEZWART.PL - OpenWrt x86/64 RTL8822CE

          Gebruik op een moderne UEFI-computer het bestand met:
          generic-ext4-combined-efi...img.gz

          Gebruik het bestand zonder '-efi' alleen voor legacy BIOS.

          Schrijf het .img.gz-bestand rechtstreeks naar een USB-stick met
          balenaEtcher of Rufus. Secure Boot moet normaal uitgeschakeld zijn.

          Eerste lokale beheeradres:
          http://10.77.77.1

          De Realtek RTL8822CE-driver, firmware, LuCI en WPA-clientsoftware
          zijn vooraf ingebouwd.

          Verbind na het opstarten in LuCI via:
          Network > Wireless > Scan > Join Network

          Instellingen:
          netwerknaam: wwan
          protocol: DHCP client
          firewallzone: wan
          EOF

          ls -lah

      - name: Upload OpenWrt USB images
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-25.12.5-x86-RTL8822CE-RDZ
          path: artifact/
          if-no-files-found: error
          retention-days: 30
