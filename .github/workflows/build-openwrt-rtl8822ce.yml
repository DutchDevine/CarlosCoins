name: Build OpenWrt x86 RTL8822CE

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-openwrt-rtl8822ce.yml'
      - 'rdzbridge/**'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    env:
      OPENWRT_VERSION: '25.12.5'
      ASU_URL: 'https://sysupgrade.openwrt.org'

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Validate RDZ source tree
        shell: bash
        run: |
          set -Eeuo pipefail

          jq empty rdzbridge/root/usr/share/luci/menu.d/luci-app-rdzbridge.json
          jq empty rdzbridge/root/usr/share/rpcd/acl.d/luci-app-rdzbridge.json

          for SCRIPT in \
            rdzbridge/root/etc/uci-defaults/98-rdzbridge-finalize \
            rdzbridge/root/etc/init.d/rdzbridge-watchdog \
            rdzbridge/root/etc/init.d/rdzbridge-recovery \
            rdzbridge/root/usr/sbin/rdzbridge-watchdog \
            rdzbridge/root/usr/libexec/rdzbridge-connectivity-status \
            rdzbridge/root/usr/libexec/rdzbridge-ethernet-status \
            rdzbridge/root/usr/libexec/rdzbridge-finalize \
            rdzbridge/root/usr/libexec/rdzbridge-hardware-selftest \
            rdzbridge/root/usr/libexec/rdzbridge-reconnect \
            rdzbridge/root/usr/libexec/rdzbridge-security-status \
            rdzbridge/root/usr/libexec/rdzbridge-watchdog-status; do
            test -x "$SCRIPT"
            sh -n "$SCRIPT"
          done

          for VIEW in overview setup diagnostics security maintenance; do
            test -s "rdzbridge/root/www/luci-static/resources/view/rdzbridge/${VIEW}.js"
          done

      - name: Request customized image from official OpenWrt builder
        shell: bash
        run: |
          set -Eeuo pipefail

          tar -C rdzbridge/root -czf rdzbridge-root.tar.gz .
          PAYLOAD="$(base64 -w 0 rdzbridge-root.tar.gz)"

          cat > defaults.sh <<'EOF_DEFAULTS'
          #!/bin/sh
          set -e

          ASU_LOG='/etc/rdz-asu-defaults.log'
          exec >"$ASU_LOG" 2>&1
          echo "RDZ ASU payload start: $(date -Iseconds 2>/dev/null || date)"

          command -v base64 >/dev/null 2>&1 || {
            echo 'ERROR: base64 decoder is unavailable'
            exit 1
          }
          command -v tar >/dev/null 2>&1 || {
            echo 'ERROR: tar is unavailable'
            exit 1
          }

          cat > /tmp/rdzbridge-root.tar.gz.b64 <<'PAYLOAD_EOF'
          __RDZ_PAYLOAD__
          PAYLOAD_EOF

          base64 -d /tmp/rdzbridge-root.tar.gz.b64 > /tmp/rdzbridge-root.tar.gz
          test -s /tmp/rdzbridge-root.tar.gz
          tar -xzf /tmp/rdzbridge-root.tar.gz -C /
          rm -f /tmp/rdzbridge-root.tar.gz /tmp/rdzbridge-root.tar.gz.b64

          test -x /etc/uci-defaults/98-rdzbridge-finalize
          test -x /usr/libexec/rdzbridge-finalize
          test -x /usr/libexec/rdzbridge-reconnect
          test -x /usr/libexec/rdzbridge-hardware-selftest
          test -s /www/luci-static/resources/view/rdzbridge/overview.js

          echo 'Running RDZ finalizer'
          /etc/uci-defaults/98-rdzbridge-finalize

          rm -f /tmp/luci-indexcache
          echo "RDZ ASU payload complete: $(date -Iseconds 2>/dev/null || date)"
          sync
          exit 0
          EOF_DEFAULTS

          sed -i "s|__RDZ_PAYLOAD__|$PAYLOAD|" defaults.sh

          jq -n \
            --arg version "$OPENWRT_VERSION" \
            --arg defaults "$(cat defaults.sh)" \
            '{
              version: $version,
              target: "x86/64",
              profile: "generic",
              packages: [
                "luci",
                "luci-ssl",
                "ca-bundle",
                "coreutils-base64",
                "kmod-rtw88-8822ce",
                "rtl8822ce-firmware",
                "wireless-regdb",
                "wpad-basic-mbedtls",
                "kmod-r8169",
                "r8169-firmware",
                "uclient-fetch",
                "iw",
                "iwinfo",
                "pciutils",
                "ethtool"
              ],
              defaults: $defaults,
              client: "github-actions-rdz/4.0",
              rootfs_size_mb: 512,
              filesystem: "ext4",
              diff_packages: false
            }' > request.json

          jq -e '.diff_packages == false' request.json >/dev/null
          for PACKAGE in coreutils-base64 kmod-rtw88-8822ce kmod-r8169 uclient-fetch; do
            jq -e --arg package "$PACKAGE" '.packages | index($package) != null' request.json >/dev/null
          done

          HTTP_CODE="$(curl -4 --silent --show-error --location \
            --connect-timeout 30 --max-time 120 \
            --output response.json --write-out '%{http_code}' \
            --header 'Content-Type: application/json' \
            --request POST \
            --data @request.json \
            "$ASU_URL/api/v1/build")"

          echo "Initial HTTP status: $HTTP_CODE"
          jq . response.json || cat response.json
          [[ "$HTTP_CODE" == "200" || "$HTTP_CODE" == "202" ]]

          REQUEST_HASH="$(jq -r '.request_hash // empty' response.json)"
          test -n "$REQUEST_HASH"

          for attempt in $(seq 1 180); do
            HTTP_CODE="$(curl -4 --silent --show-error --location \
              --connect-timeout 30 --max-time 120 \
              --output response.json --write-out '%{http_code}' \
              "$ASU_URL/api/v1/build/$REQUEST_HASH")"
            STATUS="$(jq -r '.imagebuilder_status // .detail // "unknown"' response.json 2>/dev/null || echo unknown)"
            echo "Poll $attempt: HTTP $HTTP_CODE, status $STATUS"

            if [[ "$HTTP_CODE" == "200" && "$STATUS" == "done" ]]; then
              break
            fi
            [[ "$HTTP_CODE" == "200" || "$HTTP_CODE" == "202" ]]
            if [[ "$attempt" == "180" ]]; then
              echo 'Timed out waiting for the OpenWrt image build.' >&2
              exit 1
            fi
            sleep 10
          done

          jq . response.json
          cp response.json build-response.json

      - name: Validate installed package set
        shell: bash
        run: |
          set -Eeuo pipefail

          jq -e '.detail == "done" and .imagebuilder_status == "done"' build-response.json >/dev/null
          jq -r '.stdout // empty' build-response.json > build-stdout.log

          for PACKAGE in \
            uci netifd dnsmasq dropbear firewall4 uhttpd luci coreutils-base64 \
            kmod-r8169 kmod-rtw88-8822ce rtl8822ce-firmware r8169-firmware; do
            grep -Eq "Installing ${PACKAGE} \(" build-stdout.log || {
              echo "Essentieel pakket ontbreekt in buildlog: $PACKAGE" >&2
              exit 1
            }
          done

      - name: Download generated USB boot images
        shell: bash
        run: |
          set -Eeuo pipefail

          mkdir -p artifact
          BIN_DIR="$(jq -r '.bin_dir // empty' build-response.json)"
          test -n "$BIN_DIR"

          mapfile -t IMAGES < <(
            jq -r '.images[]?.name // empty' build-response.json |
            grep -E 'generic-ext4-combined(-efi)?[^/]*\.img\.gz$' || true
          )
          [[ "${#IMAGES[@]}" -gt 0 ]]

          for IMAGE in "${IMAGES[@]}"; do
            curl -4 --fail --show-error --location --retry 5 --retry-delay 5 \
              --output "artifact/$IMAGE" \
              "$ASU_URL/store/$BIN_DIR/$IMAGE"
          done

          gzip -t artifact/*.img.gz
          cp build-response.json artifact/
          (
            cd artifact
            sha256sum *.img.gz > RDZ-SHA256SUMS.txt
          )

          cat > artifact/README-FIRST.txt <<'EOF_README'
          RENZODEZWART.PL - OpenWrt x86/64 RDZ 5G Bridge

          Hardware:
          - Realtek RTL8822CE wifi, PCI ID 10EC:C822
          - Realtek RTL8111/RTL8168 Ethernet, PCI ID 10EC:8168

          Gebruik combined-efi op een moderne UEFI-computer.
          Gebruik de image zonder -efi alleen voor legacy BIOS.

          Schrijf het .img.gz-bestand rechtstreeks naar USB met balenaEtcher
          of Rufus. Schakel Secure Boot zo nodig uit.

          Beheeradres: http://10.77.77.1

          Eerste gebruik:
          1. Stel een rootwachtwoord in.
          2. Open de RDZ-wifiwizard.
          3. Kies de telefoonhotspot en vul het wachtwoord in.
          4. De router configureert WWAN, NAT, DHCP en Ethernet-out automatisch.
          EOF_README

      - name: QEMU deterministic first-boot test
        id: qemu_smoke
        shell: bash
        run: |
          set -Eeuo pipefail

          sudo apt-get update
          sudo apt-get install -y qemu-system-x86

          LEGACY_IMAGE="$(find artifact -maxdepth 1 -type f -name '*generic-ext4-combined*.img.gz' ! -name '*combined-efi*' | head -n 1)"
          test -n "$LEGACY_IMAGE"
          gzip -dc "$LEGACY_IMAGE" > openwrt-rdz-smoke.img

          cat > qemu-guest-commands.sh <<'EOF_GUEST'
          echo RDZ_LIVE_TEST_BEGIN

          WAIT=0
          while [ "$WAIT" -lt 90 ]; do
            if [ -s /etc/rdzbridge-ready.json ]; then
              STATUS="$(jsonfilter -i /etc/rdzbridge-ready.json -e '@.status' 2>/dev/null)"
              [ "$STATUS" = ready ] && break
              [ "$STATUS" = failed ] && break
            fi
            WAIT=$((WAIT + 1))
            sleep 1
          done
          echo "RDZ_READY_WAIT_SECONDS=$WAIT"

          command -v base64 >/dev/null 2>&1 && echo RDZ_BASE64_OK || echo RDZ_BASE64_MISSING

          LAN_IP="$(uci -q get network.lan.ipaddr)"
          LAN_DEVICE="$(uci -q get network.lan.device)"
          BRIDGE_PORTS="$(uci -q get network.br_lan.ports)"
          echo "RDZ_LAN_IP=$LAN_IP"
          echo "RDZ_LAN_DEVICE=$LAN_DEVICE"
          echo "RDZ_BRIDGE_PORTS=$BRIDGE_PORTS"

          # Poll boundedly for the virtual NIC and bridge to become operationally
          # ready.  netifd configures the kernel bridge asynchronously after the
          # first-boot finalize exits, so a single-shot sample is unreliable.
          ETH_POLL=0
          ETH_IFACE_OK=0
          while [ "$ETH_POLL" -lt 60 ]; do
            ETH_OPER="$(cat /sys/class/net/eth0/operstate 2>/dev/null || echo unknown)"
            ETH_CARR="$(cat /sys/class/net/eth0/carrier 2>/dev/null || echo 0)"
            BR_OPER="$(cat /sys/class/net/br-lan/operstate 2>/dev/null || echo unknown)"
            if [ "$ETH_OPER" = up ] || [ "$ETH_CARR" = 1 ] || [ "$BR_OPER" = up ]; then
              ETH_IFACE_OK=1
              break
            fi
            ETH_POLL=$((ETH_POLL + 1))
            sleep 1
          done

          ETH_CARRIER="$(cat /sys/class/net/eth0/carrier 2>/dev/null || echo unknown)"
          ETH_OPERSTATE="$(cat /sys/class/net/eth0/operstate 2>/dev/null || echo unknown)"
          BR_OPERSTATE="$(cat /sys/class/net/br-lan/operstate 2>/dev/null || echo unknown)"
          echo "RDZ_ETH_CARRIER=$ETH_CARRIER"
          echo "RDZ_ETH_OPERSTATE=$ETH_OPERSTATE"
          echo "RDZ_BR_OPERSTATE=$BR_OPERSTATE"
          echo "RDZ_ETH_POLL_SECONDS=$ETH_POLL"
          [ "$ETH_IFACE_OK" = 1 ] && echo RDZ_ETH_IFACE_UP || echo RDZ_ETH_IFACE_DOWN

          # Diagnostic interface state for the artifact log
          ip link show eth0 2>/dev/null || true
          ip link show br-lan 2>/dev/null || true

          # Validate packet transmission through the emulated NIC by pinging the LAN
          # bridge address.  This succeeds once br-lan is up with its IP assigned,
          # independent of physical cable carrier.
          ping -c 2 -W 3 10.77.77.1 >/dev/null 2>&1 && echo RDZ_PING_LAN_OK || echo RDZ_PING_LAN_FAILED

          if [ -s /etc/rdzbridge-ready.json ]; then
            echo RDZ_READY_FILE_OK
            cat /etc/rdzbridge-ready.json
          else
            echo RDZ_READY_FILE_MISSING
          fi

          [ -s /www/luci-static/resources/view/rdzbridge/overview.js ] && echo RDZ_GUI_OVERVIEW_OK || echo RDZ_GUI_OVERVIEW_MISSING
          [ -s /www/luci-static/resources/view/rdzbridge/setup.js ] && echo RDZ_GUI_SETUP_OK || echo RDZ_GUI_SETUP_MISSING
          [ -s /www/luci-static/resources/view/rdzbridge/diagnostics.js ] && echo RDZ_GUI_DIAGNOSTICS_OK || echo RDZ_GUI_DIAGNOSTICS_MISSING
          [ -x /usr/libexec/rdzbridge-reconnect ] && echo RDZ_RECONNECT_OK || echo RDZ_RECONNECT_MISSING
          [ -x /usr/libexec/rdzbridge-hardware-selftest ] && echo RDZ_SELFTEST_OK || echo RDZ_SELFTEST_MISSING
          [ ! -e /etc/uci-defaults/98-rdzbridge-finalize ] && echo RDZ_TRANSIENT_FINALIZER_REMOVED || echo RDZ_TRANSIENT_FINALIZER_PRESENT

          /etc/init.d/rdzbridge-watchdog enabled >/dev/null 2>&1 && echo RDZ_WATCHDOG_OK || echo RDZ_WATCHDOG_MISSING
          /etc/init.d/rdzbridge-recovery enabled >/dev/null 2>&1 && echo RDZ_RECOVERY_OK || echo RDZ_RECOVERY_MISSING
          /etc/init.d/uhttpd enabled >/dev/null 2>&1 && echo RDZ_UHTTPD_ENABLED || echo RDZ_UHTTPD_DISABLED
          wget -q -T 5 -O /dev/null http://127.0.0.1/cgi-bin/luci/ >/dev/null 2>&1 && echo RDZ_LUCI_HTTP_OK || echo RDZ_LUCI_HTTP_FAILED

          echo RDZ_ASU_DEFAULTS_LOG_BEGIN
          cat /etc/rdz-asu-defaults.log 2>/dev/null || true
          echo RDZ_ASU_DEFAULTS_LOG_END

          echo RDZ_FIRSTBOOT_LOG_BEGIN
          cat /etc/rdzbridge-firstboot.log 2>/dev/null || true
          echo RDZ_FIRSTBOOT_LOG_END

          echo RDZ_WRAPPER_LOG_BEGIN
          cat /etc/rdzbridge-wrapper.log 2>/dev/null || true
          echo RDZ_WRAPPER_LOG_END

          echo RDZ_LIVE_TEST_END
          sync
          poweroff
          EOF_GUEST

          {
            sleep 28
            printf '\n'
            sleep 2
            cat qemu-guest-commands.sh
          } | timeout --signal=TERM --kill-after=10s 250s qemu-system-x86_64 \
            -m 512 -smp 2 -nographic -no-reboot \
            -drive file=openwrt-rdz-smoke.img,format=raw,if=ide,cache=none \
            -netdev user,id=net0 -device e1000,netdev=net0 \
            > artifact/QEMU-BOOT.log 2>&1 || QEMU_RC=$?

          QEMU_RC="${QEMU_RC:-0}"
          echo "QEMU exit code: $QEMU_RC"
          tail -n 300 artifact/QEMU-BOOT.log || true

          sed -n '/RDZ_ASU_DEFAULTS_LOG_BEGIN/,/RDZ_ASU_DEFAULTS_LOG_END/p' artifact/QEMU-BOOT.log > artifact/RDZ-ASU-DEFAULTS.log
          sed -n '/RDZ_FIRSTBOOT_LOG_BEGIN/,/RDZ_FIRSTBOOT_LOG_END/p' artifact/QEMU-BOOT.log > artifact/RDZ-FIRSTBOOT.log
          sed -n '/RDZ_WRAPPER_LOG_BEGIN/,/RDZ_WRAPPER_LOG_END/p' artifact/QEMU-BOOT.log > artifact/RDZ-WRAPPER.log
          grep -m1 '^{' artifact/QEMU-BOOT.log | grep '"status"' > artifact/RDZ-READY.json || true

          if grep -Eiq 'kernel panic|not syncing|unable to mount root|no working init found|uci: not found|netifd: not found|dnsmasq: not found|"status":"failed"' artifact/QEMU-BOOT.log; then
            echo 'QEMU-log bevat een fatale boot- of configuratiefout.' >&2
            exit 1
          fi

          require_log() {
            local pattern="$1"
            local description="$2"
            grep -Eq "$pattern" artifact/QEMU-BOOT.log || {
              echo "Ontbrekende runtimebevestiging: $description" >&2
              exit 1
            }
            echo "Runtimebevestiging: $description"
          }

          require_log 'VFS: Mounted root \(ext4 filesystem\)' 'EXT4-rootbestandssysteem gemount'
          require_log 'EXT4-fs .* re-mounted .* r/w' 'rootbestandssysteem schrijfbaar'
          require_log 'procd: - init -' 'OpenWrt init voltooid'
          require_log 'RDZ_LIVE_TEST_BEGIN' 'live test gestart'
          require_log 'RDZ_BASE64_OK' 'base64-decoder aanwezig'
          require_log 'RDZ_LAN_IP=10\.77\.77\.1' 'LAN-adres correct'
          require_log 'RDZ_LAN_DEVICE=br-lan' 'LAN gekoppeld aan bridge'
          require_log 'RDZ_BRIDGE_PORTS=.*eth0' 'virtuele Ethernetpoort aan br-lan gekoppeld'
          require_log 'RDZ_ETH_IFACE_UP' 'virtuele Ethernetinterface administratief actief in bridge'
          require_log 'RDZ_PING_LAN_OK' 'br-lan bereikbaar via ICMP'
          require_log 'RDZ_READY_FILE_OK' 'ready-marker aanwezig'
          require_log '"status":"ready"' 'first boot volledig afgerond'
          require_log 'RDZ_GUI_OVERVIEW_OK' 'overzichts-GUI aanwezig'
          require_log 'RDZ_GUI_SETUP_OK' 'wifiwizard aanwezig'
          require_log 'RDZ_GUI_DIAGNOSTICS_OK' 'diagnosepagina aanwezig'
          require_log 'RDZ_RECONNECT_OK' 'verbindingsbackend aanwezig'
          require_log 'RDZ_SELFTEST_OK' 'hardwarezelftest aanwezig'
          require_log 'RDZ_TRANSIENT_FINALIZER_REMOVED' 'tijdelijk first-bootscript verwijderd'
          require_log 'RDZ_WATCHDOG_OK' 'watchdog enabled'
          require_log 'RDZ_RECOVERY_OK' 'recoveryservice enabled'
          require_log 'RDZ_UHTTPD_ENABLED' 'LuCI-webserver enabled'
          require_log 'RDZ_LUCI_HTTP_OK' 'LuCI lokaal bereikbaar'
          require_log 'RDZ_LIVE_TEST_END' 'live test afgerond'

          echo 'Deterministische QEMU first-bootvalidatie geslaagd.'

      - name: Upload OpenWrt USB images
        if: always() && hashFiles('artifact/*.img.gz') != ''
        uses: actions/upload-artifact@v7
        with:
          name: OpenWrt-25.12.5-x86-RTL8822CE-RTL8168-RDZ-GUI-v9
          path: artifact/
          if-no-files-found: error
          retention-days: 30

      - name: Upload build failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: RDZ-build-failure-diagnostics-${{ github.run_number }}
          path: |
            request.json
            response.json
            build-response.json
            build-stdout.log
            artifact/QEMU-BOOT.log
            artifact/RDZ-ASU-DEFAULTS.log
            artifact/RDZ-FIRSTBOOT.log
            artifact/RDZ-WRAPPER.log
            artifact/RDZ-READY.json
          if-no-files-found: warn
          retention-days: 14
